##
## Teleport configuration file.
##
## IMPORTANT: The "REMOTE_MACHINE" variable MUST be filled out manually prior to usage
##


## The following string is what scp will use to connect to the remote machine.
## Usually it should follow the default format:
# REMOTE_MACHINE=USERNAME@REMOTE_URL
## However in case a custom ssh connection string has been specified in the .ssh/config
## that string should be used:
# REMOTE_MACHINE=CUSTOM_SSH_CONNECTION_STRING
REMOTE_MACHINE=


## ================================================================================= ##
## == UNLESS THERE ARE SPECIFIC NEEDS FOR IT, DO NOT EDIT THE FOLLOWING VARIABLES == ##
## ================================================================================= ##

## The folloeing variables indicate the path to the local and remote teleporter
TELEPORTER_LOCAL_PATH=~
TELEPORTER_REMOTE_PATH=~

## The following variables indicate the path to the local and remote clipboard teleporter
CLIPBOARD_LOCAL_PATH=~
CLIPBOARD_REMOTE_PATH=~

## The following variables indicate the mame of the directory / file of the data and clipboard teleporter
## respectively located at TELEPORTER_REMOTE_PATH / TELEPORTER_REMOTE_PATH and CLIPBOARD_LOCAL_PATH / CLIPBOARD_REMOTE_PATH
TELEPORTER_NAME=teleporter
CLIPBOARD_NAME=.clipboard

## If the following variable is set to true, the REMOTE_MACHINE variable will be ignored and
## Teleport will ask for the remote machine connection string at every execution. This feature
## can be used in case multiple remote machines are used and hardcoding a connection is undesirable
ALWAYS_REQUEST_REMOTE_MACHINE=false

## If the following variable is set to true, the TELEPORTER_LOCAL_PATH variable will be requested
## before every transmission.
ALWAYS_REQUEST_LOCAL_TELEPORTER_PATH=false

## If the following variable is set to true, the TELEPORTER_REMOTE_PATH variable will be requested
## before every transmission.
ALWAYS_REQUEST_REMOTE_TELEPORTER_PATH=false


## =============================================================================== ## 
## == THE FOLLOWING VARIABLES, IF USED, SHOULD BE SET SHARED ACROSS ALL DEVICES == ##
## =============================================================================== ##

## If the following variable is set to true, all transmissions will be encrypted with gpg before
## being sent. The ENCRYPTION_KEY variable will hold the GPG symmetric encryption key to be used.
USE_ENCRYPTION=false
ENCRYPTION_KEY=

## If the following variable is set to true, all transmission data will be compressed with tar
## prior to being sent. This will result in smaller teleportation sizes (desirable if you have a
## slow internet connection and/or if you remote machine is small) however will increase execution
## time since also compression will be performed.
USE_COMPRESSION=false

